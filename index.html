<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gama Industrial — Painel de Gestão</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a18;min-height:100vh}
.header{background:#1a1a18;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:14px}
.logo-img{width:48px;height:48px;object-fit:contain;border-radius:6px;background:#000;padding:2px}
.header h1{font-size:16px;font-weight:700;letter-spacing:.5px}
.header p{font-size:11px;opacity:.5;margin-top:2px}
.header-right{font-size:12px;opacity:.5;text-align:right;line-height:1.6}
.container{max-width:800px;margin:0 auto;padding:24px 16px}
.resumo-cards{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.resumo-card{flex:1;min-width:100px;background:#fff;border-radius:12px;padding:14px;border:1px solid #e0ded6;text-align:center}
.resumo-card .num{font-size:24px;font-weight:600;color:#1a1a18}
.resumo-card .label{font-size:11px;color:#888780;margin-top:2px}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:20px;border:1px solid #d3d1c7;background:transparent;color:#5f5e5a;font-size:13px;cursor:pointer;transition:all .2s}
.tab.ativo{background:#1a1a18;color:#fff;border-color:#1a1a18}
.aba{display:none}
.aba.ativo{display:block}
.card{background:#fff;border:1px solid #e0ded6;border-radius:12px;padding:14px;margin-bottom:10px;transition:opacity .2s}
.card.feito{opacity:.45}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:500;display:inline-block}
.btn{padding:7px 16px;border-radius:8px;border:1px solid #d3d1c7;background:transparent;color:#5f5e5a;font-size:12px;cursor:pointer;transition:all .2s}
.btn:hover{background:#f4f4f0}
.btn-primary{background:#1a1a18;color:#fff;border-color:#1a1a18;font-weight:500}
.btn-primary:hover{background:#333}
.btn-wpp{border-color:#25D366;color:#25D366;display:inline-flex;align-items:center;gap:4px}
.inp{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;color:#1a1a18;font-size:13px;outline:none}
.inp:focus{border-color:#888}
.avatar{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.emoji-icon{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:#f4f4f0;border:1px solid #e0ded6}
.cat-label{font-size:11px;font-weight:600;color:#888780;margin-bottom:8px;margin-top:4px;letter-spacing:.5px}
.grid2{display:flex;gap:8px;flex-wrap:wrap}
.grid2>*{flex:1;min-width:140px}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:16px;padding:24px;width:92%;max-width:440px;border:1px solid #d3d1c7}
.modal h2{font-size:15px;font-weight:600;margin-bottom:16px}
.form-row{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.barra-prog{height:6px;background:#e0ded6;border-radius:3px;overflow:hidden;margin-top:8px}
.barra-inner{height:100%;background:#D4820A;border-radius:3px;transition:width .3s}
.filtros{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img class="logo-img" src="20250701_1115_Logo%20Gama%20Industrial_remix_01jz35cb4ze17vgv5pyqgv56sc.png" alt="Gama Industrial"/>
    <div>
      <h1>Gama Industrial</h1>
      <p>Usinas de Asfalto · Manaus, AM</p>
    </div>
  </div>
  <div class="header-right" id="data-hoje"></div>
</div>

<div class="container">

  <div class="resumo-cards">
    <div class="resumo-card">
      <div class="num" id="r-total">0/0</div>
      <div class="label">Tarefas hoje</div>
      <div class="barra-prog"><div class="barra-inner" id="r-barra" style="width:0%"></div></div>
    </div>
    <div class="resumo-card">
      <div class="num" id="r-func" style="color:#3B6D11">0</div>
      <div class="label">Funcionários ativos</div>
    </div>
    <div class="resumo-card">
      <div class="num" id="r-mat" style="color:#993C1D">0</div>
      <div class="label">Materiais a comprar</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab ativo" onclick="mudarAba('checklist',this)">✅ Checklist</button>
    <button class="tab" onclick="mudarAba('materiais',this)">📦 Materiais</button>
    <button class="tab" onclick="mudarAba('funcionarios',this)">👷 Funcionários</button>
  </div>

  <div id="aba-checklist" class="aba ativo">
    <div class="filtros">
      <button class="btn btn-primary" id="f-todos" onclick="filtrar('todos')">Todos</button>
      <button class="btn" id="f-pendente" onclick="filtrar('pendente')">Pendentes</button>
      <button class="btn" id="f-concluido" onclick="filtrar('concluido')">Concluídos</button>
    </div>
    <div id="lista-checklist"></div>
    <div style="margin-top:20px;border-top:1px solid #e0ded6;padding-top:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">+ Adicionar tarefa</div>
      <div class="form-row">
        <input class="inp" id="novo-nome" placeholder="Ex: Verificar temperatura da usina"/>
        <div class="grid2">
          <select class="inp" id="nova-cat"><option>Máquinas</option><option>Ferramentas</option><option>Segurança</option><option>Limpeza</option><option>Usina</option><option>Outros</option></select>
          <select class="inp" id="nova-prior"><option value="alta">Alta prioridade</option><option value="media" selected>Média prioridade</option><option value="baixa">Baixa prioridade</option></select>
          <select class="inp" id="novo-resp"></select>
        </div>
        <button class="btn btn-primary" onclick="adicionarItem()" style="align-self:flex-start">+ Adicionar</button>
      </div>
    </div>
    <div style="margin-top:10px;text-align:right">
      <button class="btn" onclick="resetar()">🔄 Resetar para amanhã</button>
    </div>
  </div>

  <div id="aba-materiais" class="aba">
    <div id="lista-materiais"></div>
    <div style="margin-top:20px;border-top:1px solid #e0ded6;padding-top:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px">+ Adicionar material</div>
      <div class="form-row">
        <input class="inp" id="mat-nome" placeholder="Ex: Betume, Agregado, Óleo..."/>
        <div class="grid2">
          <input class="inp" id="mat-qtd" placeholder="Qtd. Ex: 10 toneladas"/>
          <select class="inp" id="mat-status"><option value="pendente">A comprar</option><option value="pedido">Pedido feito</option><option value="chegou">Chegou</option></select>
          <select class="inp" id="mat-resp"></select>
        </div>
        <input class="inp" id="mat-obs" placeholder="Observação (opcional)"/>
        <button class="btn btn-primary" onclick="adicionarMaterial()" style="align-self:flex-start">+ Adicionar</button>
      </div>
    </div>
  </div>

  <div id="aba-funcionarios" class="aba">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:13px;color:#888780">Cadastro — Gama Industrial · Usinas de Asfalto</div>
      <button class="btn btn-primary" onclick="abrirModal()">+ Novo funcionário</button>
    </div>
    <div id="lista-funcionarios"></div>
  </div>

</div>

<div id="modal" style="display:none">
  <div class="modal-bg" onclick="fecharModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h2 id="modal-titulo">Novo funcionário</h2>
      <div class="form-row">
        <input class="inp" id="f-nome" placeholder="Nome completo"/>
        <input class="inp" id="f-cargo" placeholder="Cargo. Ex: Operador de usina"/>
        <select class="inp" id="f-setor"><option value="">Selecione o setor</option><option>Máquinas</option><option>Ferramentas</option><option>Segurança</option><option>Limpeza</option><option>Usina</option><option>Geral</option></select>
        <input class="inp" id="f-tel" placeholder="WhatsApp. Ex: 92 99999-0000"/>
        <input class="inp" id="f-email" placeholder="E-mail (opcional)"/>
        <div class="grid2">
          <select class="inp" id="f-turno"><option value="">Turno</option><option>Manhã</option><option>Tarde</option><option>Noite</option><option>Integral</option></select>
          <select class="inp" id="f-status"><option value="ativo">Ativo</option><option value="ferias">De férias</option><option value="afastado">Afastado</option></select>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarFuncionario()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
const CP={alta:{bg:'#FAECE7',c:'#993C1D',l:'Alta'},media:{bg:'#FAEEDA',c:'#854F0B',l:'Média'},baixa:{bg:'#EAF3DE',c:'#3B6D11',l:'Baixa'}};
const CS={pendente:{bg:'#FAECE7',c:'#993C1D',l:'A comprar'},pedido:{bg:'#FAEEDA',c:'#854F0B',l:'Pedido feito'},chegou:{bg:'#EAF3DE',c:'#3B6D11',l:'Chegou'}};
const SF={ativo:{bg:'#EAF3DE',c:'#3B6D11',l:'Ativo'},ferias:{bg:'#FAEEDA',c:'#854F0B',l:'Férias'},afastado:{bg:'#FAECE7',c:'#993C1D',l:'Afastado'}};
const CI={Máquinas:['⚙️','🔩','🛠️','🔄','⛽'],Ferramentas:['🔧','🪛','🔨','📐','✂️'],Segurança:['🦺','🪖','🧤','🥽','🧯'],Limpeza:['🧹','🪣','🧽','🫧','🗑️'],Usina:['🏭','🌡️','⚗️','🔥','📊'],Outros:['📋','📦','🔍','📊','🗂️']};
const AC=['#CECBF6','#9FE1CB','#F5C4B3','#FAC775','#B5D4F4','#C0DD97','#F4C0D1'];
const AT=['#3C3489','#085041','#712B13','#854F0B','#0C447C','#27500A','#72243E'];
let funcs=[
  {id:1,nome:'Carlos Mendonça',cargo:'Técnico de manutenção',setor:'Máquinas',tel:'92 99201-3344',email:'',turno:'Manhã',status:'ativo'},
  {id:2,nome:'Ana Ferreira',cargo:'Operadora de usina',setor:'Usina',tel:'92 98134-2211',email:'',turno:'Tarde',status:'ativo'},
  {id:3,nome:'Roberto Lima',cargo:'Inspetor de segurança',setor:'Segurança',tel:'92 99345-6677',email:'',turno:'Integral',status:'ativo'},
  {id:4,nome:'Joana Souza',cargo:'Auxiliar de limpeza',setor:'Limpeza',tel:'92 98765-1100',email:'',turno:'Manhã',status:'ativo'},
  {id:5,nome:'Marcos Teixeira',cargo:'Supervisor geral',setor:'Geral',tel:'92 99001-4455',email:'',turno:'Integral',status:'ativo'},
];
let itens=[
  {id:1,nome:'Verificar temperatura da usina de asfalto',cat:'Usina',prior:'alta',feito:false,respId:2,ii:1},
  {id:2,nome:'Checar nível de betume no tanque',cat:'Usina',prior:'alta',feito:false,respId:2,ii:0},
  {id:3,nome:'Inspecionar correia transportadora',cat:'Máquinas',prior:'alta',feito:false,respId:1,ii:4},
  {id:4,nome:'Verificar óleo do compressor',cat:'Máquinas',prior:'media',feito:false,respId:1,ii:0},
  {id:5,nome:'Conferir ferramentas do turno',cat:'Ferramentas',prior:'media',feito:false,respId:2,ii:0},
  {id:6,nome:'Checar extintores e EPIs',cat:'Segurança',prior:'alta',feito:false,respId:3,ii:4},
  {id:7,nome:'Verificar saídas de emergência',cat:'Segurança',prior:'media',feito:false,respId:3,ii:2},
  {id:8,nome:'Limpeza da área operacional',cat:'Limpeza',prior:'baixa',feito:false,respId:4,ii:0},
];
let mats=[
  {id:1,nome:'Betume asfáltico CAP 50/70',qtd:'2 toneladas',status:'pendente',respId:2,obs:'Pedido urgente'},
  {id:2,nome:'Óleo lubrificante ISO 46',qtd:'5 litros',status:'pedido',respId:1,obs:'Fornecedor: Peças & Cia'},
  {id:3,nome:'Luvas de segurança térmica',qtd:'10 pares',status:'chegou',respId:3,obs:'Reabastecido'},
  {id:4,nome:'Filtro do compressor',qtd:'2 unidades',status:'pendente',respId:1,obs:''},
];
let filtro='todos',aba='checklist',niId=10,nmId=6,nfId=6,editId=null;
document.getElementById('data-hoje').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
function gF(id){return funcs.find(f=>f.id===id)||funcs[4];}
function aL(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}
function aC(id){return AC[(id-1)%AC.length];}
function aT(id){return AT[(id-1)%AT.length];}
function wpp(tel){window.open('https://wa.me/55'+tel.replace(/\D/g,''),'_blank');}
function atualizarResumo(){
  const f=itens.filter(i=>i.feito).length,t=itens.length;
  document.getElementById('r-total').textContent=f+'/'+t;
  document.getElementById('r-barra').style.width=(t?Math.round(f/t*100):0)+'%';
  document.getElementById('r-func').textContent=funcs.filter(f=>f.status==='ativo').length;
  document.getElementById('r-mat').textContent=mats.filter(m=>m.status==='pendente').length;
}
function popularSelects(){
  const ativos=funcs.filter(f=>f.status==='ativo');
  ['novo-resp','mat-resp'].forEach(id=>{
    const s=document.getElementById(id);
    if(s)s.innerHTML=ativos.map(f=>`<option value="${f.id}">${f.nome}</option>`).join('');
  });
}
function mudarAba(a,btn){
  aba=a;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  document.querySelectorAll('.aba').forEach(el=>el.classList.remove('ativo'));
  document.getElementById('aba-'+a).classList.add('ativo');
  renderizar();
}
function filtrar(f){
  filtro=f;
  ['todos','pendente','concluido'].forEach(x=>{
    const b=document.getElementById('f-'+x);
    if(!b)return;
    b.classList.toggle('btn-primary',x===f);
    b.style.color=x===f?'#fff':'';
    b.style.borderColor=x===f?'#1a1a18':'';
  });
  renderChecklist();
}
function renderChecklist(){
  const vis=itens.filter(i=>filtro==='pendente'?!i.feito:filtro==='concluido'?i.feito:true);
  const g={};
  vis.forEach(i=>{if(!g[i.cat])g[i.cat]=[];g[i.cat].push(i);});
  document.getElementById('lista-checklist').innerHTML=Object.keys(g).map(cat=>`
    <div style="margin-bottom:18px">
      <div class="cat-label">${cat.toUpperCase()}</div>
      ${g[cat].map(item=>{
        const r=gF(item.respId);
        const em=(CI[item.cat]||CI['Outros'])[item.ii||0];
        return `<div class="card ${item.feito?'feito':''}">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <input type="checkbox" ${item.feito?'checked':''} onchange="toggleItem(${item.id})" style="width:18px;height:18px;cursor:pointer;margin-top:3px;flex-shrink:0"/>
            <div class="emoji-icon">${em}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:13px;font-weight:500;text-decoration:${item.feito?'line-through':'none'};margin-bottom:6px">${item.nome}</div>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span class="badge" style="background:${CP[item.prior].bg};color:${CP[item.prior].c}">${CP[item.prior].l}</span>
                <div style="display:flex;align-items:center;gap:5px">
                  <div class="avatar" style="width:22px;height:22px;font-size:10px;background:${aC(r.id)};color:${aT(r.id)}">${aL(r.nome)}</div>
                  <span style="font-size:12px;color:#888780">${r.nome}</span>
                </div>
                ${!item.feito?`<button class="btn btn-wpp" onclick="wpp('${r.tel}')" style="padding:3px 10px;font-size:11px">📲 WhatsApp</button>`:''}
              </div>
            </div>
            <button onclick="removerItem(${item.id})" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:18px;padding:0">×</button>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('')||'<div style="text-align:center;padding:40px;color:#aaa;font-size:13px">Nenhum item aqui.</div>';
  popularSelects();atualizarResumo();
}
function renderMateriais(){
  document.getElementById('lista-materiais').innerHTML=mats.map(m=>{
    const r=gF(m.respId);
    return `<div class="card">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div class="emoji-icon">📦</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500;margin-bottom:4px">${m.nome}</div>
          <div style="font-size:12px;color:#888780;margin-bottom:6px">Qtd: ${m.qtd}${m.obs?' · '+m.obs:''}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="badge" style="background:${CS[m.status].bg};color:${CS[m.status].c}">${CS[m.status].l}</span>
            <div style="display:flex;align-items:center;gap:5px">
              <div class="avatar" style="width:22px;height:22px;font-size:10px;background:${aC(r.id)};color:${aT(r.id)}">${aL(r.nome)}</div>
              <span style="font-size:12px;color:#888780">${r.nome}</span>
            </div>
            <button class="btn btn-wpp" onclick="wpp('${r.tel}')" style="padding:3px 10px;font-size:11px">📲 WhatsApp</button>
            <select onchange="mudarStatus(${m.id},this.value)" style="font-size:11px;padding:4px 6px;border-radius:8px;border:1px solid #d3d1c7;background:#fff;cursor:pointer">
              <option value="pendente" ${m.status==='pendente'?'selected':''}>A comprar</option>
              <option value="pedido" ${m.status==='pedido'?'selected':''}>Pedido feito</option>
              <option value="chegou" ${m.status==='chegou'?'selected':''}>Chegou</option>
            </select>
          </div>
        </div>
        <button onclick="removerMat(${m.id})" style="background:none;border:none;color:#aaa;cursor:pointer;font-size:18px;padding:0">×</button>
      </div>
    </div>`;
  }).join('')||'<div style="text-align:center;padding:40px;color:#aaa;font-size:13px">Nenhum material.</div>';
  popularSelects();atualizarResumo();
}
function renderFuncionarios(){
  const at=funcs.filter(f=>f.status==='ativo').length;
  document.getElementById('lista-funcionarios').innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
      ${[['Total',funcs.length,'#1a1a18'],['Ativos',at,'#3B6D11'],['Férias',funcs.filter(f=>f.status==='ferias').length,'#854F0B'],['Afastados',funcs.filter(f=>f.status==='afastado').length,'#993C1D']].map(([l,n,c])=>`
      <div style="flex:1;min-width:80px;background:#fff;border:1px solid #e0ded6;border-radius:10px;padding:12px;text-align:center">
        <div style="font-size:22px;font-weight:600;color:${c}">${n}</div>
        <div style="font-size:11px;color:#888780">${l}</div>
      </div>`).join('')}
    </div>
    ${funcs.map(f=>`
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="avatar" style="width:46px;height:46px;font-size:15px;background:${aC(f.id)};color:${aT(f.id)}">${aL(f.nome)}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">
            <span style="font-size:14px;font-weight:600">${f.nome}</span>
            <span class="badge" style="background:${SF[f.status].bg};color:${SF[f.status].c}">${SF[f.status].l}</span>
          </div>
          <div style="font-size:12px;color:#888780">${f.cargo} · ${f.setor} · ${f.turno}</div>
          <div style="font-size:12px;color:#888780;margin-top:2px">📞 ${f.tel}${f.email?' · ✉️ '+f.email:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
          <button class="btn btn-wpp" onclick="wpp('${f.tel}')" style="padding:5px 12px;font-size:12px">📲 WhatsApp</button>
          <button class="btn" onclick="editarFunc(${f.id})" style="padding:5px 12px;font-size:12px">✏️ Editar</button>
        </div>
      </div>
    </div>`).join('')}`;
  atualizarResumo();
}
function renderizar(){
  if(aba==='checklist')renderChecklist();
  else if(aba==='materiais')renderMateriais();
  else if(aba==='funcionarios')renderFuncionarios();
}
function toggleItem(id){const i=itens.find(x=>x.id===id);if(i){i.feito=!i.feito;renderizar();}}
function removerItem(id){itens=itens.filter(x=>x.id!==id);renderizar();}
function removerMat(id){mats=mats.filter(x=>x.id!==id);renderizar();}
function mudarStatus(id,v){const m=mats.find(x=>x.id===id);if(m){m.status=v;renderizar();}}
function resetar(){itens.forEach(i=>i.feito=false);renderizar();}
function adicionarItem(){
  const n=document.getElementById('novo-nome').value.trim();if(!n)return;
  const cat=document.getElementById('nova-cat').value;
  itens.push({id:niId++,nome:n,cat,prior:document.getElementById('nova-prior').value,feito:false,respId:parseInt(document.getElementById('novo-resp').value),ii:0});
  document.getElementById('novo-nome').value='';renderizar();
}
function adicionarMaterial(){
  const n=document.getElementById('mat-nome').value.trim();if(!n)return;
  mats.push({id:nmId++,nome:n,qtd:document.getElementById('mat-qtd').value||'—',status:document.getElementById('mat-status').value,respId:parseInt(document.getElementById('mat-resp').value),obs:document.getElementById('mat-obs').value});
  document.getElementById('mat-nome').value='';
  document.getElementById('mat-qtd').value='';
  document.getElementById('mat-obs').value='';
  renderizar();
}
function abrirModal(limpar=true){
  if(limpar){
    editId=null;
    document.getElementById('modal-titulo').textContent='Novo funcionário';
    ['f-nome','f-cargo','f-tel','f-email'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-setor').value='';
    document.getElementById('f-turno').value='';
    document.getElementById('f-status').value='ativo';
  }
  document.getElementById('modal').style.display='block';
}
function fecharModal(){document.getElementById('modal').style.display='none';}
function editarFunc(id){
  const f=funcs.find(x=>x.id===id);if(!f)return;
  editId=id;
  document.getElementById('modal-titulo').textContent='Editar funcionário';
  document.getElementById('f-nome').value=f.nome;
  document.getElementById('f-cargo').value=f.cargo;
  document.getElementById('f-setor').value=f.setor;
  document.getElementById('f-tel').value=f.tel;
  document.getElementById('f-email').value=f.email||'';
  document.getElementById('f-turno').value=f.turno;
  document.getElementById('f-status').value=f.status;
  abrirModal(false);
}
function salvarFuncionario(){
  const n=document.getElementById('f-nome').value.trim();if(!n)return;
  const d={nome:n,cargo:document.getElementById('f-cargo').value,setor:document.getElementById('f-setor').value||'Geral',tel:document.getElementById('f-tel').value,email:document.getElementById('f-email').value,turno:document.getElementById('f-turno').value||'Integral',status:document.getElementById('f-status').value};
  if(editId){const i=funcs.findIndex(f=>f.id===editId);funcs[i]={...funcs[i],...d};}
  else{funcs.push({id:nfId++,...d});}
  fecharModal();renderizar();
}
renderizar();
</script>
</body>
</html>
